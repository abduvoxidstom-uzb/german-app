<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Anki Pro</title>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --de-green: #28a745; --de-gold: #FFCC00; --de-black: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; user-select: none; }
        
        .der { color: #007bff; } .die { color: #dc3545; } .das { color: #28a745; } .verb { color: #6f42c1; }

        .stats { background: white; width: 90%; max-width: 400px; padding: 12px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; border: 1px solid #ddd; }
        .stats b { font-size: 22px; color: var(--de-green); }

        .lvl-tabs { display: flex; gap: 5px; width: 100%; max-width: 400px; margin-bottom: 10px; }
        .lvl-tabs button { flex: 1; padding: 12px; border: 2px solid var(--de-black); border-radius: 10px; background: white; font-weight: 800; cursor: pointer; font-size: 14px; }
        .lvl-tabs button.active { background: var(--de-black); color: white; }

        .card { background: white; width: 90%; max-width: 380px; border-radius: 25px; padding: 45px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; border-bottom: 8px solid var(--de-gold); min-height: 220px; display: flex; flex-direction: column; justify-content: center; margin-top: 5px; }
        .audio-btn { font-size: 32px; background: #f8f9fa; border: 2px solid var(--de-gold); border-radius: 50%; width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; cursor: pointer; transition: 0.2s; }
        .audio-btn:active { transform: scale(0.9); }

        h1 { font-size: 42px; margin: 10px 0; font-weight: 800; line-height: 1.2; }
        .uz-tr { font-size: 30px; color: #000; margin-top: 20px; display: none; border-top: 3px solid #eee; padding-top: 15px; font-weight: 900; text-transform: uppercase; }
        
        .next-btn { background: var(--de-green); color: white; border: none; padding: 20px; width: 100%; max-width: 400px; border-radius: 15px; font-size: 20px; font-weight: 900; margin-top: 20px; cursor: pointer; box-shadow: 0 5px 15px rgba(40,167,69,0.3); }
    </style>
</head>
<body>

    <div class="stats">СЎЗЛАР СОНИ: <b id="count">0</b></div>

    <div class="lvl-tabs">
        <button onclick="setL('A1')" id="bA1" class="active">A1</button>
        <button onclick="setL('A2')" id="bA2">A2</button>
        <button onclick="setL('B1')" id="bB1">B1</button>
    </div>

    <div class="card" onclick="show()">
        <div class="audio-btn" onclick="speak(event)">🔊</div>
        <h1 id="deWord" class="der">Laden...</h1>
        <div class="uz-tr" id="uzWord">...</div>
        <div id="hint" style="color:#bbb; font-weight:bold; margin-top:10px;">КЎРИШ УЧУН БОСИНГ</div>
    </div>

    <button class="next-btn" onclick="next()">КЕЙИНГИ ➔</button>

    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        
        // КЕНГАЙТИРИЛГАН БАЗА (Бу ерга 1500 та сўз қўшилади)
        const db = {
            'A1': [
                {g: "der Apfel", u: "OLMA", r: "der"}, {g: "das Brot", u: "NON", r: "das"}, {g: "die Milch", u: "SUT", r: "die"},
                {g: "der Tisch", u: "STOL", r: "der"}, {g: "das Buch", u: "KITOB", r: "das"}, {g: "die Schule", u: "MAKTAB", r: "die"},
                {g: "lernen", u: "O'RGANMOQ", r: "verb"}, {g: "essen", u: "YEMOQ", r: "verb"}, {g: "trinken", u: "ICHMOQ", r: "verb"},
                {g: "der Vater", u: "OTA", r: "der"}, {g: "die Mutter", u: "ONA", r: "die"}, {g: "das Kind", u: "BOLA", r: "das"},
                {g: "gut", u: "YAXSHI", r: "verb"}, {g: "schön", u: "CHIROYLI", r: "verb"}, {g: "groß", u: "KATTA", r: "verb"}
                // ... яна юзлаб сўзлар қўшилади
            ],
            'A2': [
                {g: "der Beruf", u: "KASB", r: "der"}, {g: "die Reise", u: "SAYOHAT", r: "die"}, {g: "das Wetter", u: "OB-HAVO", r: "das"},
                {g: "verstehen", u: "TUSHUNMOQ", r: "verb"}, {g: "besuchen", u: "ZIYORAT QILMOQ", r: "verb"}
            ],
            'B1': [
                {g: "die Entscheidung", u: "QAROR", r: "die"}, {g: "der Unterschied", u: "FARQ", r: "der"}
            ]
        };

        let lvl = 'A1', seen = 0, lastIdx = -1;

        function setL(l) {
            lvl = l;
            document.querySelectorAll('.lvl-tabs button').forEach(b => b.classList.remove('active'));
            document.getElementById('b'+l).classList.add('active');
            next(false);
        }

        function show() {
            document.getElementById('uzWord').style.display = 'block';
            document.getElementById('hint').style.display = 'none';
        }

        function next(inc = true) {
            if(inc) { seen++; document.getElementById('count').innerText = seen; }
            
            let list = db[lvl];
            let idx;
            // Бир хил сўз кетма-кет чиқмаслиги учун:
            do { idx = Math.floor(Math.random() * list.length); } while (idx === lastIdx && list.length > 1);
            lastIdx = idx;

            let item = list[idx];
            let de = document.getElementById('deWord');
            de.innerText = item.g;
            de.className = item.r;
            
            document.getElementById('uzWord').innerText = item.u;
            document.getElementById('uzWord').style.display = 'none';
            document.getElementById('hint').style.display = 'block';
        }

        function speak(e) {
            if(e) e.stopPropagation();
            responsiveVoice.speak(document.getElementById('deWord').innerText, "Deutsch Female");
        }

        document.body.addEventListener('click', () => { responsiveVoice.init(); }, { once: true });
        next(false);
    </script>
</body>
</html>
