<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Pro - Daily Goal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --de-green: #28a745; --de-gold: #FFCC00; --de-black: #2c3e50; --de-red: #dc3545; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 15px; }
        
        .tabs { display: flex; gap: 8px; width: 100%; max-width: 400px; margin-bottom: 15px; }
        .tabs button { flex: 1; padding: 10px; border: none; border-radius: 10px; background: #dee2e6; font-weight: bold; cursor: pointer; }
        .tabs button.active { background: var(--de-black); color: white; }

        /* Қийинлик даражаси блоки */
        .goal-selector { background: white; width: 100%; max-width: 370px; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .goal-btns { display: flex; gap: 5px; margin-top: 10px; }
        .goal-btns button { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 8px; background: #f8f9fa; font-size: 12px; font-weight: bold; cursor: pointer; }
        .goal-btns button.active { background: var(--de-gold); border-color: var(--de-black); }

        .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--de-green); width: 0%; transition: 0.5s; }

        /* Карточка ва бошқалар */
        .level-selector { display: flex; gap: 10px; width: 100%; max-width: 400px; margin-bottom: 15px; }
        .level-selector button { flex: 1; padding: 12px; border: 2px solid var(--de-black); border-radius: 12px; background: white; font-weight: 800; cursor: pointer; }
        .level-selector button.active { background: var(--de-black); color: white; }

        .card { background: white; width: 100%; max-width: 360px; border-radius: 25px; padding: 40px 20px; box-shadow: 0 12px 28px rgba(0,0,0,0.12); text-align: center; border-bottom: 8px solid var(--de-gold); position: relative; }
        h1 { font-size: 38px; color: var(--de-black); margin: 15px 0; }
        .uzbek { font-size: 24px; color: #333; margin-top: 20px; display: none; border-top: 2px dashed #eee; padding-top: 15px; font-weight: 900; }
        
        .audio-btn { background: #f1f3f5; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; border: 1px solid #ddd; cursor: pointer; }
        .next-btn { background: var(--de-green); color: white; border: none; padding: 18px; width: 100%; max-width: 400px; border-radius: 15px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        
        .congrats { color: var(--de-green); font-weight: bold; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="tabs">
        <button onclick="showSection('learn')" id="tabLearn" class="active">📖 Ўрганиш</button>
        <button onclick="showSection('game')" id="tabGame">🎮 Ўйин</button>
    </div>

    <div class="goal-selector" id="goalBlock">
        <span style="font-size: 14px; font-weight: bold;">Кунлик режани танланг:</span>
        <div class="goal-btns">
            <button onclick="setGoal(6, this)" id="goal6">Енгил (6)</button>
            <button onclick="setGoal(20, this)" id="goal20">Ўрта (20)</button>
            <button onclick="setGoal(40, this)" id="goal40">Қийин (40)</button>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div style="font-size: 11px; margin-top: 5px; color: #666;">
            Прогресс: <span id="progressText">0</span> / <span id="goalText">6</span>
        </div>
        <div class="congrats" id="congratsMsg">🎉 Бугунги режа бажарилди!</div>
    </div>

    <div id="learnSection" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="level-selector">
            <button onclick="setLevel('A1')" id="btnA1" class="active">A1</button>
            <button onclick="setLevel('A2')" id="btnA2">A2</button>
        </div>
        
        <div class="card" onclick="showTranslation()">
            <button class="audio-btn" onclick="playAudio(event)">🔊</button>
            <h1 id="deWordDisplay">Lernen</h1>
            <div class="uzbek" id="uzWordDisplay">ЎРГАНМОҚ</div>
            <p id="hintText" style="color: #adb5bd; font-size: 12px; margin-top: 15px;">Таржима учун босинг</p>
        </div>
        
        <button class="next-btn" onclick="handleNext()">Кейинги сўз ➔</button>
    </div>

    <div id="gameSection" style="width: 100%; display: none; flex-direction: column; align-items: center;">
        <div style="background:white; padding:30px; border-radius:20px; text-align:center; width:90%;">
            <h2 id="quizQ">...</h2>
            <div id="quizOptions" style="display:grid; gap:10px;"></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const dictionary = {
            'A1': [
                {g: "Brot", u: "NON"}, {g: "Wasser", u: "SUV"}, {g: "Milch", u: "SUT"},
                {g: "Schule", u: "MAKTAB"}, {g: "Lehrer", u: "O'QITUVCHI"}, {g: "Buch", u: "KITOB"}
            ],
            'A2': [
                {g: "Verstehen", u: "TUSHUNMOQ"}, {g: "Vergessen", u: "UNUTMOQ"}, {g: "Wichtig", u: "MUHIM"}
            ]
        };

        let dailyGoal = 6;
        let wordsSeen = 0;
        let currentLevel = 'A1';

        function setGoal(num, btn) {
            dailyGoal = num;
            document.querySelectorAll('.goal-btns button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('goalText').innerText = num;
            updateProgress();
        }

        function handleNext() {
            wordsSeen++;
            updateProgress();
            nextWord();
        }

        function updateProgress() {
            let percent = (wordsSeen / dailyGoal) * 100;
            if(percent > 100) percent = 100;
            document.getElementById('progressFill').style.width = percent + "%";
            document.getElementById('progressText').innerText = wordsSeen;
            
            if(wordsSeen >= dailyGoal) {
                document.getElementById('congratsMsg').style.display = 'block';
            }
        }

        function setLevel(lvl) {
            currentLevel = lvl;
            document.querySelectorAll('.level-selector button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn' + lvl).classList.add('active');
            nextWord();
        }

        function showTranslation() {
            document.getElementById('uzWordDisplay').style.display = 'block';
            document.getElementById('hintText').style.display = 'none';
        }

        function nextWord() {
            let list = dictionary[currentLevel];
            let item = list[Math.floor(Math.random() * list.length)];
            document.getElementById('deWordDisplay').innerText = item.g;
            document.getElementById('uzWordDisplay').innerText = item.u;
            document.getElementById('uzWordDisplay').style.display = 'none';
            document.getElementById('hintText').style.display = 'block';
        }

        function playAudio(event) {
            event.stopPropagation();
            let text = document.getElementById('deWordDisplay').innerText;
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'de-DE';
            window.speechSynthesis.speak(utterance);
        }

        function showSection(sec) {
            document.getElementById('learnSection').style.display = sec === 'learn' ? 'flex' : 'none';
            document.getElementById('gameSection').style.display = sec === 'game' ? 'flex' : 'none';
            document.getElementById('goalBlock').style.display = sec === 'learn' ? 'block' : 'none';
        }

        nextWord();
        document.getElementById('goal6').classList.add('active');
    </script>
</body>
</html>
