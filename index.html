<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Anki - Abduvoxid</title>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --de-green: #28a745; --de-gold: #FFCC00; --de-black: #2c3e50; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 15px; }
        
        /* Родлар учун Anki ранглари */
        .der { color: #007bff; } /* Кўк */
        .die { color: #dc3545; } /* Қизил */
        .das { color: #28a745; } /* Яшил */

        /* Статистика блоки */
        .stats-card { background: white; width: 100%; max-width: 400px; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        .stats-num { font-size: 20px; font-weight: 900; color: var(--de-green); }

        .lvl-tabs { display: flex; gap: 8px; width: 100%; max-width: 400px; margin-bottom: 15px; }
        .lvl-tabs button { flex: 1; padding: 12px; border: 2px solid var(--de-black); border-radius: 12px; background: white; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .lvl-tabs button.active { background: var(--de-black); color: white; }

        /* Anki Карточкаси */
        .anki-card { background: white; width: 100%; max-width: 380px; border-radius: 30px; padding: 50px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; border-bottom: 10px solid var(--de-gold); cursor: pointer; min-height: 250px; display: flex; flex-direction: column; justify-content: center; }
        
        .audio-btn { font-size: 35px; background: #f0f2f5; border: 2px solid var(--de-gold); border-radius: 50%; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        
        h1 { font-size: 45px; margin: 10px 0; font-weight: 800; }
        .uz-translate { font-size: 32px; color: #000; margin-top: 20px; display: none; border-top: 4px solid #f8f9fa; padding-top: 20px; font-weight: 900; text-transform: uppercase; }
        
        .hint { color: #adb5bd; font-size: 14px; margin-top: 15px; font-weight: bold; }

        .next-btn { background: var(--de-green); color: white; border: none; padding: 22px; width: 100%; max-width: 400px; border-radius: 20px; font-size: 22px; font-weight: 900; margin-top: 25px; cursor: pointer; box-shadow: 0 8px 20px rgba(40,167,69,0.3); }
    </style>
</head>
<body>

    <div class="stats-card">
        <div style="font-size: 12px; font-weight: bold; color: #666;">БУГУН КЎРИЛГАН СЎЗЛАР</div>
        <div class="stats-num" id="totalSeen">0</div>
    </div>

    <div class="lvl-tabs">
        <button onclick="changeLevel('A1')" id="lA1" class="active">A1</button>
        <button onclick="changeLevel('A2')" id="lA2">A2</button>
        <button onclick="changeLevel('B1')" id="lB1">B1</button>
    </div>

    <div class="anki-card" onclick="showAnswer()">
        <div class="audio-btn" onclick="sayIt(event)">🔊</div>
        <h1 id="germanWord" class="der">Lernen</h1>
        <div class="uz-translate" id="uzWord">ЎРГАНМОҚ</div>
        <div class="hint" id="hintText">Таржима учун босинг</div>
    </div>

    <button class="next-btn" onclick="nextCard()">КЕЙИНГИ ➔</button>

    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        
        const database = {
            'A1': [
                {g: "der Tisch", u: "STOL", r: "der"}, 
                {g: "die Schule", u: "MAKTAB", r: "die"}, 
                {g: "das Buch", u: "KITOB", r: "das"},
                {g: "der Vater", u: "OTA", r: "der"},
                {g: "die Hand", u: "QO'L", r: "die"}
            ],
            'A2': [
                {g: "der Urlaub", u: "TA'TIL", r: "der"},
                {g: "die Reise", u: "SAYOHAT", r: "die"},
                {g: "das Wetter", u: "OB-HAVO", r: "das"}
            ],
            'B1': [
                {g: "die Entscheidung", u: "QAROR", r: "die"},
                {g: "der Unterschied", u: "FARQ", r: "der"}
            ]
        };

        let currentLevel = 'A1';
        let count = 0;

        function changeLevel(lvl) {
            currentLevel = lvl;
            document.querySelectorAll('.lvl-tabs button').forEach(b => b.classList.remove('active'));
            document.getElementById('l' + lvl).classList.add('active');
            nextCard(false);
        }

        function showAnswer() {
            document.getElementById('uzWord').style.display = 'block';
            document.getElementById('hintText').style.display = 'none';
        }

        function nextCard(isNew = true) {
            if(isNew) {
                count++;
                document.getElementById('totalSeen').innerText = count;
            }
            
            let list = database[currentLevel];
            let item = list[Math.floor(Math.random() * list.length)];
            
            let gW = document.getElementById('germanWord');
            gW.innerText = item.g;
            gW.className = item.r; // Ранг бериш
            
            document.getElementById('uzWord').innerText = item.u;
            document.getElementById('uzWord').style.display = 'none';
            document.getElementById('hintText').style.display = 'block';
        }

        function sayIt(e) {
            if(e) e.stopPropagation();
            let text = document.getElementById('germanWord').innerText;
            responsiveVoice.speak(text, "Deutsch Female");
        }

        // Илк фаоллаштириш
        document.body.addEventListener('click', () => { responsiveVoice.init(); }, { once: true });
        nextCard(false);
    </script>
</body>
</html>
