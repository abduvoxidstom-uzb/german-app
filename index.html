<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Немисча Луғат Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #0088cc; --success: #4CAF50; --bg: #f5f7fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; margin-bottom: 20px; }
        .menu button { padding: 15px; border: none; border-radius: 12px; background: white; font-weight: bold; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; }
        .menu button.active { background: var(--primary); color: white; }
        .card { background: white; width: 100%; max-width: 400px; border-radius: 25px; padding: 60px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; border: 1px solid #eee; margin-top: auto; margin-bottom: auto; }
        .level-badge { background: var(--success); color: white; padding: 5px 15px; border-radius: 50px; font-size: 12px; margin-bottom: 15px; display: inline-block; text-transform: uppercase; }
        h1 { font-size: 32px; color: #2c3e50; margin: 10px 0; }
        .uzbek { font-size: 20px; color: #7f8c8d; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; min-height: 30px; }
        .btn-next { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; max-width: 400px; border-radius: 15px; font-size: 18px; font-weight: bold; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,136,204,0.3); }
    </style>
</head>
<body>

    <div class="menu">
        <button onclick="setArray('A1')" id="btnA1" class="active">A1 (Boshlang'ich)</button>
        <button onclick="setArray('A2')" id="btnA2">A2 (Davomchilar)</button>
    </div>

    <div class="card" onclick="showTranslation()">
        <div class="level-badge" id="lvlBadge">A1 Даража</div>
        <h1 id="deText">Lernen</h1>
        <div class="uzbek" id="uzText" style="display: none;">Ўрганмоқ</div>
        <div id="hint" style="color: #bbb; font-size: 12px; margin-top: 10px;">Таржима учун устига босинг</div>
    </div>

    <button class="btn-next" onclick="nextWord()">Кейинги сўз ➔</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const data = {
            'A1': [
                {g: "Hallo", u: "Salom"}, {g: "Danke", u: "Rahmat"}, {g: "Bitte", u: "Iltimos / Arzimaydi"},
                {g: "Essen", u: "Yemoq"}, {g: "Trinken", u: "Ichmoq"}, {g: "Sprechen", u: "Gapirmoq"},
                {g: "Schreiben", u: "Yozmoq"}, {g: "Lesen", u: "O'qimoq"}, {g: "Die Schule", u: "Maktab"},
                {g: "Das Buch", u: "Kitob"}, {g: "Frühstücken", u: "Nonushta qilmoq"}, {g: "Kaufen", u: "Sotib olmoq"}
            ],
            'A2': [
                {g: "Verstehen", u: "Tushunmoq"}, {g: "Vergessen", u: "Unutmoq"}, {g: "Erinnern", u: "Eslamoq"},
                {g: "Besuchen", u: "Ziyorat qilmoq"}, {g: "Gefährlich", u: "Xavfli"}, {g: "Wichtig", u: "Muhim"},
                {g: "Erklären", u: "Tushuntirmoq"}, {g: "Der Erfolg", u: "Muvaffaqiyat"}
            ]
        };

        let currentLevel = 'A1';
        
        function setArray(lvl) {
            currentLevel = lvl;
            document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn' + lvl).classList.add('active');
            document.getElementById('lvlBadge').innerText = lvl + " Даража";
            nextWord();
        }

        function showTranslation() {
            document.getElementById('uzText').style.display = 'block';
            document.getElementById('hint').style.display = 'none';
        }

        function nextWord() {
            let list = data[currentLevel];
            let word = list[Math.floor(Math.random() * list.length)];
            document.getElementById('deText').innerText = word.g;
            document.getElementById('uzText').innerText = word.u;
            document.getElementById('uzText').style.display = 'none';
            document.getElementById('hint').style.display = 'block';
        }
    </script>
</body>
</html>
