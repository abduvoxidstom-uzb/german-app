<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Pro - Abduvoxid</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --de-green: #28a745; --de-gold: #FFCC00; --de-black: #2c3e50; --de-red: #dc3545; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 15px; }
        
        /* Юқориги таблар */
        .tabs { display: flex; gap: 8px; width: 100%; max-width: 400px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 12px; border: none; border-radius: 12px; background: #dee2e6; font-weight: bold; cursor: pointer; transition: 0.3s; color: #495057; }
        .tabs button.active { background: var(--de-black); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* Даража тугмалари (Алоҳида кўринишда) */
        .level-selector { display: flex; gap: 10px; width: 100%; max-width: 400px; margin-bottom: 15px; }
        .level-selector button { flex: 1; padding: 14px; border: 2px solid var(--de-black); border-radius: 12px; background: white; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .level-selector button.active { background: var(--de-black); color: white; }

        /* Карточка */
        .card, .quiz-card { background: white; width: 100%; max-width: 360px; border-radius: 25px; padding: 45px 20px; box-shadow: 0 12px 28px rgba(0,0,0,0.12); text-align: center; border-bottom: 8px solid var(--de-gold); position: relative; margin-top: 10px; }
        
        .level-tag { position: absolute; top: 15px; right: 20px; font-size: 12px; font-weight: bold; color: var(--de-red); border: 1.5px solid var(--de-red); padding: 3px 10px; border-radius: 6px; text-transform: uppercase; }
        
        h1 { font-size: 40px; color: var(--de-black); margin: 15px 0; font-weight: 700; }
        
        /* Ўзбекча таржима (Жирний шрифт) */
        .uzbek { font-size: 24px; color: #333; margin-top: 20px; display: none; border-top: 2px dashed #eee; padding-top: 15px; font-weight: 900; }
        
        .audio-btn { background: #f1f3f5; border: 1px solid #ced4da; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; cursor: pointer; font-size: 22px; transition: 0.2s; }
        .audio-btn:active { background: #e9ecef; transform: scale(0.95); }

        /* Асосий тугма (Яшил) */
        .next-btn { background: var(--de-green); color: white; border: none; padding: 20px; width: 100%; max-width: 400px; border-radius: 18px; font-size: 19px; font-weight: bold; margin-top: 25px; box-shadow: 0 6px 16px rgba(40,167,69,0.35); cursor: pointer; transition: 0.2s; }
        .next-btn:active { transform: translateY(3px); box-shadow: 0 2px 8px rgba(40,167,69,0.3); }

        /* Quiz опциялари */
        .options { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 25px; }
        .option-btn { padding: 16px; border: 2px solid #e9ecef; border-radius: 15px; background: white; cursor: pointer; transition: 0.2s; font-size: 18px; font-weight: 700; color: #495057; }
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
    </style>
</head>
<body>

    <div class="tabs">
        <button onclick="showSection('learn')" id="tabLearn" class="active">📖 Ўрганиш</button>
        <button onclick="showSection('game')" id="tabGame">🎮 Ўйин</button>
    </div>

    <div id="learnSection" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="level-selector">
            <button onclick="setLevel('A1')" id="btnA1" class="active">A1 ДАРАЖА</button>
            <button onclick="setLevel('A2')" id="btnA2">A2 ДАРАЖА</button>
        </div>
        
        <div class="card" onclick="showTranslation()">
            <div class="level-tag" id="lvlTagDisplay">A1</div>
            <button class="audio-btn" onclick="playAudio(event)">🔊</button>
            <h1 id="deWordDisplay">Lernen</h1>
            <div class="uzbek" id="uzWordDisplay">ЎРГАНМОҚ</div>
            <p id="hintText" style="color: #adb5bd; font-size: 13px; margin-top: 15px;">Таржима учун босинг</p>
        </div>
        
        <button class="next-btn" onclick="nextWord()">Кейинги сўз ➔</button>
    </div>

    <div id="gameSection" style="width: 100%; display: none; flex-direction: column; align-items: center;">
        <div class="quiz-card">
            <p style="color:#6c757d; font-weight: bold; margin:0;">Тўғри таржимани танланг:</p>
            <h2 id="quizQuestion" style="font-size: 34px; margin: 20px 0; color: var(--de-black);">...</h2>
            <div class="options" id="quizOptions"></div>
        </div>
        <button class="next-btn" onclick="startQuiz()" style="background: var(--de-black);">Янги савол ↻</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const dictionary = {
            'A1': [
                {g: "Brot", u: "NON"}, {g: "Wasser", u: "SUV"}, {g: "Milch", u: "SUT"},
                {g: "Schule", u: "MAKTAB"}, {g: "Lehrer", u: "O'QITUVCHI"}, {g: "Buch", u: "KITOB"},
                {g: "Essen", u: "YEMOQ"}, {g: "Trinken", u: "ICHMOQ"}, {g: "Schlafen", u: "UXLAMOQ"}
            ],
            'A2': [
                {g: "Verstehen", u: "TUSHUNMOQ"}, {g: "Vergessen", u: "UNUTMOQ"}, {g: "Besuchen", u: "ZIYORAT QILMOQ"},
                {g: "Erklären", u: "TUSHUNTIRMOQ"}, {g: "Wichtig", u: "MUHIM"}, {g: "Reisen", u: "SAYOHAT QILMOQ"}
            ]
        };

        let currentLevel = 'A1';

        function setLevel(lvl) {
            currentLevel = lvl;
            document.querySelectorAll('.level-selector button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn' + lvl).classList.add('active');
            document.getElementById('lvlTagDisplay').innerText = lvl;
            nextWord();
        }

        function showSection(sec) {
            document.getElementById('learnSection').style.display = sec === 'learn' ? 'flex' : 'none';
            document.getElementById('gameSection').style.display = sec === 'game' ? 'flex' : 'none';
            document.getElementById('tabLearn').classList.toggle('active', sec === 'learn');
            document.getElementById('tabGame').classList.toggle('active', sec === 'game');
            if(sec === 'game') startQuiz();
        }

        function showTranslation() {
            document.getElementById('uzWordDisplay').style.display = 'block';
            document.getElementById('hintText').style.display = 'none';
        }

        function nextWord() {
            let list = dictionary[currentLevel];
            let item = list[Math.floor(Math.random() * list.length)];
            document.getElementById('deWordDisplay').innerText = item.g;
            document.getElementById('uzWordDisplay').innerText = item.u;
            document.getElementById('uzWordDisplay').style.display = 'none';
            document.getElementById('hintText').style.display = 'block';
        }

        function playAudio(event) {
            event.stopPropagation();
            let text = document.getElementById('deWordDisplay').innerText;
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'de-DE';
            window.speechSynthesis.speak(utterance);
        }

        function startQuiz() {
            let allWords = [...dictionary['A1'], ...dictionary['A2']];
            let correctItem = allWords[Math.floor(Math.random() * allWords.length)];
            document.getElementById('quizQuestion').innerText = correctItem.g;
            
            let options = [correctItem.u];
            while(options.length < 4) {
                let randomU = allWords[Math.floor(Math.random() * allWords.length)].u;
                if(!options.includes(randomU)) options.push(randomU);
            }
            options.sort(() => Math.random() - 0.5);

            let optionsHtml = '';
            options.forEach(opt => {
                optionsHtml += `<button class="option-btn" onclick="checkAnswer(this, '${opt}', '${correctItem.u}')">${opt}</button>`;
            });
            document.getElementById('quizOptions').innerHTML = optionsHtml;
        }

        function checkAnswer(btn, selected, correct) {
            if(selected === correct) {
                btn.classList.add('correct');
                setTimeout(startQuiz, 1000);
            } else {
                btn.classList.add('wrong');
            }
        }

        nextWord();
    </script>
</body>
</html>
